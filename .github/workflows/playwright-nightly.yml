name: Playwright Journeys (Nightly)

on:
  schedule:
    - cron: '0 4 * * *'  # 4 AM UTC daily
  workflow_dispatch:       # Manual trigger

jobs:
  playwright:
    name: Playwright Critical Journeys
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev servers
        run: npm run dev &
        env:
          NODE_ENV: test
          DATABASE_URL: file:./test.db
          PORT: 3001
          OIDC_ISSUER_URI: https://accounts.google.com
          OIDC_AUDIENCE: test-audience

      - name: Wait for servers
        run: npx wait-on http://localhost:3000 http://localhost:3001 --timeout 60000

      - name: Run Playwright journeys
        run: cd apps/e2e && npx playwright test --project=chromium
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
